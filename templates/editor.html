<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>편집 — {{ job_id }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/editor.css">
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800">
    <div class="flex items-center gap-3">
      <a href="/" class="text-gray-400 hover:text-white text-sm">&larr; 대시보드</a>
      <span class="text-sm text-gray-500">|</span>
      <span class="text-sm font-medium">{{ job_id }}</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-save" onclick="saveEdits()"
        class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-xs font-medium transition">
        저장
      </button>
      <button id="btn-apply" onclick="applyEdits()"
        class="px-3 py-1.5 bg-orange-600 hover:bg-orange-500 rounded text-xs font-medium transition">
        적용 (재렌더)
      </button>
    </div>
  </header>

  <!-- Main Editor Area -->
  <div class="flex-1 flex overflow-hidden">

    <!-- Left: SFX Panel -->
    <aside id="sfx-panel" class="w-56 bg-gray-900 border-r border-gray-800 flex flex-col overflow-y-auto">
      <!-- 검색 -->
      <div class="p-2 border-b border-gray-800">
        <input type="text" id="sidebar-search" placeholder="검색..."
               oninput="filterSidebarItems(this.value)"
               class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-gray-300 outline-none focus:border-orange-500">
      </div>
      <!-- 효과음 -->
      <div class="sidebar-section" data-section="sfx">
        <div class="sidebar-section-header" onclick="toggleSection('sfx')">
          <span class="sidebar-arrow">▶</span>
          <span class="text-xs font-semibold text-gray-400">효과음</span>
        </div>
        <div class="sidebar-section-body hidden" id="sfx-body">
          <div id="sfx-list" class="space-y-1"></div>
        </div>
      </div>
      <!-- BGM -->
      <div class="sidebar-section" data-section="bgm">
        <div class="sidebar-section-header" onclick="toggleSection('bgm')">
          <span class="sidebar-arrow">▶</span>
          <span class="text-xs font-semibold text-gray-400">BGM</span>
        </div>
        <div class="sidebar-section-body hidden" id="bgm-body">
          <div id="bgm-list" class="space-y-1"></div>
        </div>
      </div>
      <!-- 텍스트 이미지 -->
      <div class="sidebar-section" data-section="textimg">
        <div class="sidebar-section-header" onclick="toggleSection('textimg')">
          <span class="sidebar-arrow">▶</span>
          <span class="text-xs font-semibold text-gray-400">텍스트 이미지</span>
        </div>
        <div class="sidebar-section-body hidden" id="textimg-body">
          <div id="text-images-list" class="space-y-1"></div>
        </div>
      </div>
    </aside>

    <!-- Center: Preview + Canvas -->
    <main class="flex-1 flex flex-col">

      <!-- Video Preview -->
      <div id="preview-area" class="flex-1 flex items-center justify-center bg-black relative">
        <div id="canvas-container" class="relative" style="width:360px;height:640px;">
          <video id="preview-video" class="w-full h-full object-contain bg-black"
                 playsinline></video>
          <!-- Text overlay container (DOM overlays on top of video) -->
          <div id="text-overlay-layer" class="absolute inset-0 pointer-events-none"></div>
        </div>
      </div>

      <!-- Playback Controls -->
      <div class="flex items-center gap-3 px-4 py-2 bg-gray-900 border-t border-gray-800">
        <button id="btn-play" onclick="togglePlay()" class="text-lg">&#9654;</button>
        <span id="time-display" class="text-xs text-gray-400 font-mono w-24">00:00 / 00:00</span>
      </div>

    </main>

    <!-- Right: Properties Panel -->
    <aside id="props-panel" class="w-64 bg-gray-900 border-l border-gray-800 overflow-y-auto">
      <div class="p-3">
        <div class="flex items-center justify-between mb-2">
          <h3 class="text-xs font-semibold text-gray-400">속성</h3>
          <button onclick="addTextOverlay()" class="px-2 py-1 bg-blue-700 hover:bg-blue-600 rounded text-[10px] font-medium">
            + 텍스트
          </button>
        </div>
        <div id="props-content" class="text-xs text-gray-500"></div>
      </div>
    </aside>
  </div>

  <!-- Timeline (Bottom) -->
  <div id="timeline" class="bg-gray-900 border-t border-gray-800 flex flex-col" style="height:300px;">
    <!-- Timeline body (seekable area with playhead) -->
    <div id="timeline-body" class="relative flex-1 mx-2 mt-1 cursor-crosshair select-none">
      <!-- Playhead -->
      <div id="timeline-playhead"></div>
      <!-- Segment color bar -->
      <div id="timeline-segbar" class="flex" style="height:30px;"></div>
      <!-- Thumbnail strip -->
      <div id="timeline-thumbs" class="flex" style="height:100px;"></div>
      <!-- SFX markers track (drop zone) -->
      <div id="timeline-sfx" class="relative" style="height:60px; background:#0d1117; border:1px dashed #374151; border-radius:4px;">
        <div class="absolute left-2 top-1 text-[9px] text-gray-600 pointer-events-none select-none">SFX</div>
        <div id="sfx-markers" class="absolute inset-0"></div>
      </div>
      <!-- BGM track -->
      <div id="timeline-bgm" class="relative" style="height:40px; background:#0d1117; border:1px dashed #374151; border-radius:0 0 4px 4px; margin-top:2px;">
        <div class="absolute left-2 top-1 text-[9px] text-gray-600 pointer-events-none select-none">BGM</div>
        <div id="bgm-bar-container" class="absolute inset-0"></div>
      </div>
    </div>
  </div>

  <script>
    const JOB_ID = "{{ job_id }}";
  </script>
  <script src="/static/editor.js"></script>
</body>
</html>
