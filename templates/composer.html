<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영상 편집 — {{ job_id }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Gaegu:wght@400;700&family=Gothic+A1:wght@400;700;900&family=Jua&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/composer.css">
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800 flex-shrink-0">
    <div class="flex items-center gap-3">
      <a href="/" class="text-gray-400 hover:text-white text-sm">&larr; 대시보드</a>
      <span class="text-sm text-gray-500">|</span>
      <span class="text-sm font-medium">{{ job_id }}</span>
      <span class="text-xs text-gray-600">영상 편집</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-save" onclick="saveCompose()"
        class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-xs font-medium transition">
        저장
      </button>
      <button id="btn-render" onclick="startRender()"
        class="px-3 py-1.5 bg-orange-600 hover:bg-orange-500 rounded text-xs font-medium transition">
        렌더링 시작
      </button>
    </div>
  </header>

  <!-- Main: Preview (left) + Properties (right) -->
  <div class="flex-1 flex overflow-hidden">

    <!-- Left: SFX/BGM sidebar (collapsible) -->
    <aside id="res-panel" class="w-48 bg-gray-900 border-r border-gray-800 flex flex-col overflow-y-auto flex-shrink-0">
      <div class="p-2 border-b border-gray-800">
        <input type="text" id="sidebar-search" placeholder="검색..."
               oninput="filterSidebar(this.value)"
               class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-gray-300 outline-none focus:border-orange-500">
      </div>
      <div class="sidebar-section" data-section="sfx">
        <div class="sidebar-section-header" onclick="toggleSection('sfx')">
          <span class="sidebar-arrow">&#9654;</span>
          <span class="text-xs font-semibold text-gray-400">효과음</span>
        </div>
        <div class="sidebar-section-body hidden" id="sfx-body">
          <div id="sfx-list" class="space-y-1"></div>
        </div>
      </div>
      <div class="sidebar-section" data-section="bgm">
        <div class="sidebar-section-header" onclick="toggleSection('bgm')">
          <span class="sidebar-arrow">&#9654;</span>
          <span class="text-xs font-semibold text-gray-400">BGM</span>
        </div>
        <div class="sidebar-section-body hidden" id="bgm-body">
          <div id="bgm-list" class="space-y-1"></div>
        </div>
      </div>
    </aside>

    <!-- Center: Preview + Audio controls -->
    <div class="flex flex-col flex-shrink-0" style="width:280px;">
      <div class="flex-1 flex items-center justify-center bg-black relative">
        <div id="canvas-container" class="relative" style="width:225px;height:400px;">
          <div id="slide-preview" class="w-full h-full bg-gray-900 flex items-center justify-center">
            <span class="text-gray-600 text-xs">슬라이드를 선택하세요</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-gray-900 border-t border-gray-800">
        <button id="btn-play-slide" onclick="playSlideAudio()" class="text-sm" title="현재 슬라이드 나레이션 재생">&#9654;</button>
        <span id="audio-status" class="text-[10px] text-gray-400 font-mono flex-1">00:00</span>
        <button onclick="playAllSlides()" class="text-[10px] text-gray-400 hover:text-white px-2 py-0.5 bg-gray-800 rounded">&#9654; 전체</button>
      </div>
    </div>

    <!-- Right: Properties (compact grid) -->
    <div class="flex-1 bg-gray-900 border-l border-gray-800 overflow-y-auto">
      <div class="p-3" id="props-content">
        <div class="text-xs text-gray-500">슬라이드를 선택하세요</div>
      </div>
    </div>
  </div>

  <!-- Timeline (Bottom) -->
  <div id="timeline" class="bg-gray-900 border-t border-gray-800 flex flex-col flex-shrink-0" style="height:180px;">
    <div id="timeline-body" class="relative flex-1 mx-2 mt-1">
      <div id="slide-track" class="flex gap-1 h-full overflow-x-auto pb-1" style="align-items:stretch;"></div>
    </div>
    <div class="mx-2 mb-1">
      <div id="timeline-sfx" class="relative" style="height:28px; background:#0d1117; border:1px dashed #374151; border-radius:4px;">
        <div class="absolute left-2 top-0.5 text-[8px] text-gray-600 pointer-events-none select-none">SFX</div>
        <div id="sfx-markers" class="absolute inset-0"></div>
      </div>
      <div id="timeline-bgm" class="relative" style="height:22px; background:#0d1117; border:1px dashed #374151; border-radius:0 0 4px 4px; margin-top:1px;">
        <div class="absolute left-2 top-0.5 text-[8px] text-gray-600 pointer-events-none select-none">BGM</div>
        <div id="bgm-bar-container" class="absolute inset-0"></div>
      </div>
    </div>
  </div>

  <script>
    const JOB_ID = "{{ job_id }}";
  </script>
  <script src="/static/composer.js"></script>
</body>
</html>
