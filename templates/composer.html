<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영상 편집 — {{ job_id }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Gaegu:wght@400;700&family=Gothic+A1:wght@400;700;900&family=Jua&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/composer.css">
</head>
<body class="bg-[#15171e] text-white h-screen flex flex-col select-none overflow-hidden">

  <!-- Header -->
  <header class="comp-header">
    <div class="flex items-center gap-3">
      <a href="/" class="text-gray-400 hover:text-white text-xs">&larr; 대시보드</a>
      <span class="text-xs text-gray-600">|</span>
      <span class="text-xs font-medium text-gray-300">{{ job_id }}</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-save" onclick="saveCompose()" class="comp-btn comp-btn-secondary">저장</button>
      <button id="btn-render" onclick="startRender()" class="comp-btn comp-btn-primary">렌더링 시작</button>
    </div>
  </header>

  <!-- Main -->
  <div class="flex-1 flex overflow-hidden" style="min-height:0;">

    <!-- Icon Sidebar -->
    <nav class="comp-icon-sidebar">
      <button class="comp-icon-tab active" data-tab="media" onclick="switchTab('media')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>미디어</span>
      </button>
      <button class="comp-icon-tab" data-tab="sfx" onclick="switchTab('sfx')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
        <span>효과음</span>
      </button>
      <button class="comp-icon-tab" data-tab="bgm" onclick="switchTab('bgm')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>배경음</span>
      </button>
      <button class="comp-icon-tab" data-tab="text" onclick="switchTab('text')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
        <span>텍스트</span>
      </button>
      <button class="comp-icon-tab" data-tab="narration" onclick="switchTab('narration')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <span>나레이션</span>
      </button>
    </nav>

    <!-- Tab Panel -->
    <div class="comp-tab-panel" id="tab-panel">
      <div id="tab-media" class="comp-tab-content active"></div>
      <div id="tab-sfx" class="comp-tab-content"></div>
      <div id="tab-bgm" class="comp-tab-content"></div>
      <div id="tab-text" class="comp-tab-content"></div>
      <div id="tab-narration" class="comp-tab-content"></div>
    </div>

    <!-- Preview -->
    <div class="comp-preview-area">
      <div class="comp-preview-wrap">
        <div id="canvas-container" class="comp-canvas">
          <div id="slide-preview" class="w-full h-full bg-[#1a1c24] flex items-center justify-center rounded-lg overflow-hidden">
            <span class="text-gray-600 text-xs">슬라이드를 선택하세요</span>
          </div>
        </div>
      </div>
      <div class="comp-playback">
        <button id="btn-play-slide" onclick="playSlideAudio()" class="comp-play-btn">&#9654;</button>
        <span id="audio-status" class="text-[10px] text-gray-400 font-mono">00:00</span>
        <div class="flex-1"></div>
        <button onclick="playAllSlides()" class="text-[10px] text-gray-500 hover:text-white px-2 py-0.5 rounded hover:bg-gray-800">&#9654; 전체 미리듣기</button>
      </div>
    </div>
  </div>

  <!-- Timeline (Bottom) -->
  <div id="timeline" class="comp-timeline">
    <!-- 타임라인 눈금 -->
    <div id="timeline-ruler" class="comp-timeline-ruler"></div>
    <!-- 슬라이드 트랙 -->
    <div class="comp-track">
      <div class="comp-track-label">슬라이드</div>
      <div id="slide-track" class="comp-track-body"></div>
    </div>
    <!-- SFX 트랙 -->
    <div class="comp-track">
      <div class="comp-track-label">SFX</div>
      <div id="timeline-sfx" class="comp-track-body comp-track-drop">
        <div id="sfx-markers" class="absolute inset-0"></div>
      </div>
    </div>
    <!-- BGM 트랙 -->
    <div class="comp-track">
      <div class="comp-track-label">BGM</div>
      <div id="timeline-bgm" class="comp-track-body comp-track-drop">
        <div id="bgm-bar-container" class="absolute inset-0"></div>
      </div>
    </div>
  </div>

  <script>
    const JOB_ID = "{{ job_id }}";
  </script>
  <script src="/static/composer.js"></script>
</body>
</html>
